<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Launch • Paweł Grabowski</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styl Neo-Brutalism (v7 Premium Dark) */
        .neo-shadow { box-shadow: 10px 10px 0 #000000 !important; }
        .neo-shadow-sm { box-shadow: 6px 6px 0 #000000 !important; }
        .neo-btn:hover { transform: translate(4px, 4px); box-shadow: 2px 2px 0 #000000 !important; }
        
        /* POPRAWKA ZDJĘCIA PROFILEWEGO PAWŁA */
        .photo-wrapper {
            position: relative;
            height: 300px;
            width: 300px;
            overflow: hidden;
            border: 6px solid #000000;
            border-radius: 50%;
            background: #d1d5db;
            margin: 0 auto;
        }
        
        .photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 50% 18% - To jest klucz do wykadrowania twarzy Pawła na środek okręgu */
            object-position: 50% 18%; 
            transform: scale(1.1); /* Delikatne powiększenie */
        }
    </style>
</head>
<body class="bg-[#1e293b] text-white antialiased">

    <header class="py-20">
        <div class="mx-auto max-w-7xl px-6">
            <div class="grid items-center gap-16 lg:grid-cols-2">
                
                <div>
                    <div class="neo-shadow-sm mb-8 inline-block rounded-lg border-2 border-black bg-[#ccff00] px-4 py-2 text-sm font-black uppercase tracking-widest text-black">
                        IT Launch • Paweł Grabowski
                    </div>

                    <h1 class="text-7xl font-black leading-[1.05] tracking-tight lg:text-8xl">
                        Wdrażam <br>
                        ERP i <br>
                        <span class="bg-black text-[#ccff00] px-3">ogarniam</span> <br>
                        <span class="bg-black text-[#ccff00] px-3">projekty</span>, <br>
                        które inni <br>
                        komplikują.
                    </h1>

                    <p class="mt-10 text-xl font-bold leading-relaxed text-blue-100 max-w-md">
                        Wchodzę w chaos, upraszczam procesy i dowożę efekt.
                    </p>

                    <div class="mt-12 flex flex-wrap gap-6">
                        <a href="mailto:pawel@itlaunch.net" 
                           class="neo-btn neo-shadow rounded-2xl border-4 border-black bg-[#ccff00] px-10 py-5 text-2xl font-black text-black transition-all">
                            Napisz do mnie
                        </a>
                        <a href="https://www.linkedin.com" 
                           class="neo-btn neo-shadow rounded-2xl border-4 border-black bg-white px-10 py-5 text-2xl font-black text-black transition-all">
                            LinkedIn
                        </a>
                    </div>
                </div>

                <div class="flex justify-center">
                    <div class="neo-shadow w-full max-w-[440px] rounded-[40px] border-4 border-black bg-white p-10 text-black">
                        
                        <div class="photo-wrapper neo-shadow-sm mb-10">
                            <img src="profilowe.png" alt="Paweł Grabowski">
                        </div>
                        
                        <div class="text-center">
                            <h2 class="text-4xl font-black uppercase tracking-tight">Paweł Grabowski</h2>
                            <p class="mt-2 text-xl font-bold text-[#2563eb]">Ekspert wdrożeń ERP</p>
                            
                            <hr class="my-8 border-t-2 border-black">
                            
                            <p class="text-lg font-medium italic text-gray-700 leading-snug">
                                "Łączę analizę z dowożeniem. <br> Bez ściemy."
                            </p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>

</body>
</html>
